<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharePoint Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased p-4">

    <div class="bg-gray-800 rounded-2xl p-6 mb-6 shadow-lg text-center mt-4">
        <h2 class="text-gray-400 text-sm uppercase tracking-wider mb-1">Total Balance</h2>
        <h1 class="text-4xl font-bold text-green-400" id="balanceDisplay">₦0</h1>
        
        <button onclick="fundWallet()" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition duration-200">
            Fund Wallet via SquadCo
        </button>
        <p id="fundingDetails" class="text-xs text-gray-400 mt-2 hidden"></p>
    </div>

    <h3 class="text-xl font-bold mb-4">Available Shares</h3>
    
    <div class="bg-gray-800 rounded-2xl p-5 shadow-lg flex justify-between items-center">
        <div>
            <h4 class="text-lg font-bold text-white">Silver Share</h4>
            <p class="text-sm text-gray-400">Cost: ₦10,000</p>
            <p class="text-sm text-green-400">Earn: ₦200 / day</p>
            <p class="text-xs text-gray-500">Duration: 30 Days</p>
        </div>
        <button onclick="buyShare('silver')" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-xl transition duration-200">
            Buy
        </button>
    </div>

    <script src="script.js"></script>
</body>
  </html>

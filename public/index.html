<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharePoint SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0f0c29] via-[#302b63] to-[#24243e] text-white font-sans antialiased pb-24 min-h-screen">

    <div id="authView" class="block px-6 pt-20 h-screen text-center">
        <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-cyan-400 to-purple-500 mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(34,211,238,0.3)]">
            <i class="fa-solid fa-rocket text-4xl text-white"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-purple-400 mb-2" id="authTitle">Loading...</h1>
        <p class="text-gray-400 text-sm mb-8" id="authSub">Connecting to secure server.</p>

        <div id="authForm" class="hidden space-y-4">
            <input type="text" id="authUsername" placeholder="Create Username" class="w-full bg-black/40 text-white rounded-xl p-4 border border-white/10 outline-none focus:border-cyan-400">
            <input type="password" id="authPassword" placeholder="Enter Password" class="w-full bg-black/40 text-white rounded-xl p-4 border border-white/10 outline-none focus:border-cyan-400">
            <button onclick="submitAuth()" id="authBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)] active:scale-95">Proceed</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        
        <div id="dashboardView" class="block px-4 pt-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <p class="text-gray-400 text-sm">Welcome back,</p>
                    <h1 class="text-2xl font-extrabold text-white" id="userNameDisplay">User</h1>
                </div>
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/20">
                    <i class="fa-solid fa-user text-cyan-400 text-sm"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="glass-panel rounded-3xl p-5 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-20 h-20 bg-blue-500/20 rounded-full blur-xl -mr-4 -mt-4"></div>
                    <p class="text-gray-400 text-xs uppercase tracking-widest mb-1 font-bold">Wallet</p>
                    <h2 class="text-2xl font-black text-white mb-3" id="walletBalanceDisplay">₦0</h2>
                    <button onclick="showDepositPage()" class="w-full bg-white/10 hover:bg-white/20 text-white text-sm font-bold py-2 rounded-xl transition border border-white/5">Deposit</button>
                </div>
                
                <div class="glass-panel rounded-3xl p-5 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-20 h-20 bg-emerald-500/20 rounded-full blur-xl -mr-4 -mt-4"></div>
                    <p class="text-gray-400 text-xs uppercase tracking-widest mb-1 font-bold">Earnings</p>
                    <h2 class="text-2xl font-bold text-emerald-400 mb-3" id="withdrawableBalanceDisplay">₦0</h2>
                    <button onclick="showWithdrawPage()" class="w-full bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-sm font-bold py-2 rounded-xl transition border border-emerald-500/20">Withdraw</button>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="text-lg font-bold mb-4 text-white tracking-wide border-b border-white/10 pb-2">Available Shares</h3>
                <div id="dynamicPlansList" class="space-y-4">
                    </div>
            </div>
        </div>

        <div id="portfolioView" class="hidden px-4 pt-6">
            <h2 class="text-2xl font-extrabold text-white mb-2">My Portfolio</h2>
            <div id="investmentsList" class="space-y-4 mt-6"></div>
        </div>

        <div id="referralView" class="hidden px-4 pt-6">
            <h2 class="text-2xl font-extrabold text-white mb-2">Refer & Earn</h2>
            <div class="grid grid-cols-2 gap-4 mb-6 mt-4">
                <div class="glass-panel rounded-2xl p-4 text-center shadow-lg">
                    <h3 class="text-2xl font-bold text-cyan-400" id="referralCountDisplay">0</h3>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold mt-1">Total Invites</p>
                </div>
                <div class="glass-panel rounded-2xl p-4 text-center shadow-lg">
                    <h3 class="text-2xl font-bold text-purple-400">5% + 10%</h3>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold mt-1">Bonus Structure</p>
                </div>
            </div>
            <div class="glass-panel rounded-3xl p-5 shadow-2xl">
                <h4 class="text-white font-bold mb-2">Your Invite Link</h4>
                <div class="bg-black/50 rounded-xl p-3 flex justify-between items-center border border-white/5 mb-4">
                    <p id="refLinkText" class="text-cyan-300 text-xs overflow-hidden text-ellipsis whitespace-nowrap mr-2"></p>
                    <button onclick="copyRefLink()" class="bg-white/10 text-white p-2 rounded-lg"><i class="fa-regular fa-copy"></i></button>
                </div>
                <button onclick="shareLink()" class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 text-white font-bold py-3 rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)] active:scale-95">Share Link</button>
            </div>
        </div>

        <div id="adminView" class="hidden px-4 pt-6">
            <h2 class="text-2xl font-extrabold text-red-400 mb-4"><i class="fa-solid fa-shield-halved mr-2"></i>Admin Center</h2>
            
            <div class="flex space-x-2 mb-6">
                <button onclick="switchAdminSubTab('withdrawals')" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg text-sm font-bold border border-red-500/30">Withdrawals</button>
                <button onclick="switchAdminSubTab('plans')" class="px-4 py-2 bg-white/10 text-white rounded-lg text-sm font-bold border border-white/10">Add Plan</button>
                <button onclick="switchAdminSubTab('users')" class="px-4 py-2 bg-white/10 text-white rounded-lg text-sm font-bold border border-white/10">Users</button>
            </div>

            <div id="admin-withdrawals" class="space-y-3">
                <p class="text-gray-400 text-sm mb-2">Pending Payouts:</p>
                <div id="adminWithdrawalList" class="space-y-3"></div>
            </div>

            <div id="admin-plans" class="hidden glass-panel p-5 rounded-2xl">
                <input type="text" id="newPlanName" placeholder="Plan Name (e.g. Gold Tier)" class="w-full bg-black/40 text-white rounded-xl p-3 mb-3 outline-none border border-white/10">
                <input type="text" id="newPlanIcon" placeholder="Icon Class (e.g. fa-star)" class="w-full bg-black/40 text-white rounded-xl p-3 mb-3 outline-none border border-white/10">
                <input type="number" id="newPlanCost" placeholder="Cost to Buy (₦)" class="w-full bg-black/40 text-white rounded-xl p-3 mb-3 outline-none border border-white/10">
                <input type="number" id="newPlanDaily" placeholder="Daily Return (₦)" class="w-full bg-black/40 text-white rounded-xl p-3 mb-3 outline-none border border-white/10">
                <input type="number" id="newPlanDuration" placeholder="Duration (Days)" class="w-full bg-black/40 text-white rounded-xl p-3 mb-4 outline-none border border-white/10">
                <button onclick="adminAddPlan()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl shadow-lg">Publish New Share Plan</button>
            </div>

            <div id="admin-users" class="hidden">
                <div id="adminUsersList" class="space-y-3"></div>
            </div>
        </div>

        <div id="depositView" class="hidden px-4 pt-6">... </div> <div id="withdrawView" class="hidden px-4 pt-6">... </div>

        <nav id="bottomNav" class="fixed bottom-0 left-0 w-full bg-[#0f0c29]/90 backdrop-blur-xl border-t border-white/10 px-6 py-3 pb-safe z-50">
            <div class="flex justify-between items-center px-2">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex flex-col items-center text-cyan-400 transition"><i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[10px]">Home</span></button>
                <button onclick="switchTab('portfolio')" id="tab-portfolio" class="flex flex-col items-center text-gray-500 transition"><i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px]">Portfolio</span></button>
                <button onclick="switchTab('referral')" id="tab-referral" class="flex flex-col items-center text-gray-500 transition"><i class="fa-solid fa-users text-xl mb-1"></i><span class="text-[10px]">Referrals</span></button>
                <button onclick="switchTab('admin')" id="tab-admin" class="hidden flex-col items-center text-red-500 transition"><i class="fa-solid fa-shield text-xl mb-1"></i><span class="text-[10px]">Admin</span></button>
            </div>
        </nav>
    </div>

    <div id="depositModal" class="hidden"></div>
    <div id="withdrawModal" class="hidden"></div>

    <script src="script.js"></script>
</body>
                    </html>

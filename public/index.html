<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharePoint Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Smooth scrolling and hide scrollbar for sleek look */
        body { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-slate-900 to-black text-white font-sans antialiased pb-24 min-h-screen">

    <div id="dashboardView" class="block px-4 pt-6">
        
        <div class="flex items-center justify-between mb-6">
            <div>
                <p class="text-gray-400 text-sm">Welcome back,</p>
                <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400" id="userNameDisplay">Investor</h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center shadow-lg border border-white/20">
                <i class="fa-solid fa-user text-white text-sm"></i>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="relative overflow-hidden rounded-3xl p-5 shadow-2xl bg-gradient-to-br from-blue-600 to-blue-900 border border-blue-400/30">
                <div class="absolute top-0 right-0 -mr-4 -mt-4 w-20 h-20 rounded-full bg-white opacity-10 blur-xl"></div>
                <p class="text-white/70 text-xs uppercase tracking-wider mb-1 font-semibold">Wallet</p>
                <h2 class="text-2xl font-bold text-white mb-3" id="walletBalanceDisplay">₦0</h2>
                <button onclick="showDepositPage()" class="w-full bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white text-sm font-bold py-2 rounded-xl transition duration-200 shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> Fund
                </button>
            </div>
            
            <div class="relative overflow-hidden rounded-3xl p-5 shadow-2xl bg-gradient-to-br from-emerald-500 to-teal-800 border border-emerald-400/30">
                <div class="absolute top-0 right-0 -mr-4 -mt-4 w-20 h-20 rounded-full bg-white opacity-10 blur-xl"></div>
                <p class="text-white/70 text-xs uppercase tracking-wider mb-1 font-semibold">Earnings</p>
                <h2 class="text-2xl font-bold text-white mb-3" id="withdrawableBalanceDisplay">₦0</h2>
                <button class="w-full bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white text-sm font-bold py-2 rounded-xl transition duration-200 shadow-sm">
                    <i class="fa-solid fa-arrow-up-right-from-square mr-1"></i> Withdraw
                </button>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-lg font-bold mb-4 text-white/90 tracking-wide">Explore Shares</h3>
            
            <div class="bg-white/5 backdrop-blur-lg rounded-3xl p-5 shadow-xl border border-white/10 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl -z-10"></div>
                
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-gray-200 to-gray-400 flex items-center justify-center shadow-inner">
                            <i class="fa-solid fa-gem text-gray-800 text-xl"></i>
                        </div>
                        <div>
                            <h4 class="text-lg font-bold text-white">Silver Plan</h4>
                            <p class="text-xs text-gray-400">30 Days Duration</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-white">₦10,000</p>
                    </div>
                </div>
                
                <div class="flex justify-between items-center mt-4 pt-4 border-t border-white/10">
                    <div>
                        <p class="text-xs text-gray-400">Daily Return</p>
                        <p class="text-sm font-bold text-emerald-400">+₦200</p>
                    </div>
                    <button onclick="buyShare('silver')" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-2 px-6 rounded-xl transition shadow-lg shadow-purple-900/40 active:scale-95">
                        Invest Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="portfolioView" class="hidden px-4 pt-6">
        <h2 class="text-2xl font-extrabold text-white mb-2">My Portfolio</h2>
        <p class="text-gray-400 text-sm mb-6">Track your active investments and total earnings.</p>

        <div id="investmentsList" class="space-y-4">
            <p class="text-gray-500 text-center italic mt-10">Loading portfolio...</p>
        </div>
    </div>

    <div id="depositView" class="hidden px-4 pt-6">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-blue-600/20 flex items-center justify-center mx-auto mb-3 border border-blue-500/30">
                <i class="fa-solid fa-wallet text-2xl text-blue-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">Fund Wallet</h2>
            <p class="text-gray-400 text-sm">Add funds securely via SquadCo</p>
        </div>
        
        <p class="text-xs text-gray-400 mb-3 font-semibold tracking-wide">QUICK AMOUNTS</p>
        <div class="grid grid-cols-3 gap-3 mb-6">
            <button onclick="setAmount(5000)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold active:bg-white/10 transition">5,000</button>
            <button onclick="setAmount(10000)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold active:bg-white/10 transition">10,000</button>
            <button onclick="setAmount(20000)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold active:bg-white/10 transition">20,000</button>
            <button onclick="setAmount(50000)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold active:bg-white/10 transition">50,000</button>
            <button onclick="setAmount(100000)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold active:bg-white/10 transition">100,000</button>
            <button onclick="setAmount(250000)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold active:bg-white/10 transition">250,000</button>
        </div>

        <div class="bg-white/5 p-4 rounded-2xl border border-white/10 shadow-inner">
            <label class="block text-xs text-gray-400 mb-2 font-semibold">CUSTOM AMOUNT (₦)</label>
            <input type="number" id="depositAmount" placeholder="10000" class="w-full bg-black/40 text-white text-xl font-bold rounded-xl p-4 outline-none border border-white/10 focus:border-blue-500 transition mb-4 placeholder-gray-600">
            
            <button id="generateLinkBtn" onclick="fundWallet()" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl transition duration-200 shadow-lg shadow-blue-900/40 active:scale-95 text-lg">
                Proceed to Payment
            </button>
        </div>
    </div>

    <nav id="bottomNav" class="fixed bottom-0 left-0 w-full bg-gray-900/80 backdrop-blur-xl border-t border-white/10 px-6 py-3 pb-safe z-50">
        <div class="flex justify-around items-center">
            
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex flex-col items-center text-blue-400 transition">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Home</span>
            </button>
            
            <button onclick="switchTab('portfolio')" id="tab-portfolio" class="flex flex-col items-center text-gray-500 hover:text-gray-300 transition">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Portfolio</span>
            </button>
            
            <button onclick="tg.showAlert('Coming Soon!')" class="flex flex-col items-center text-gray-500 hover:text-gray-300 transition">
                <i class="fa-solid fa-users text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Referrals</span>
            </button>
            
        </div>
    </nav>

    <script src="script.js"></script>
</body>
    </html>
